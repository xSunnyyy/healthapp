name: Build APK

on:
  push:
    branches: [main, "claude/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases on tag push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Installs Gradle on the runner and adds it to PATH, so we can call
      # `gradle ...` directly — no committed gradle-wrapper.jar needed.
      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.11.1"

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK with short SHA
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk \
             out/vitals-${GITHUB_SHA::7}.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitals-debug-apk
          path: out/vitals-*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release (only on v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/vitals-*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
